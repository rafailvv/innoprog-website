services:
  website:
    image: innoprog-website:${IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      labels:
        org.opencontainers.image.revision: ${IMAGE_REVISION:-local}
    container_name: innoprog-website
    labels:
      org.opencontainers.image.revision: ${IMAGE_REVISION:-local}
    restart: unless-stopped
    mem_limit: 768m
    cpus: 1.0
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "127.0.0.1:8082:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
