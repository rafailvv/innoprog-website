name: tests

on:
  push:
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test:ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: website-test-artifacts
          path: |
            test-results
            coverage
